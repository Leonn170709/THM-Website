<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THM - Analytics Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* Reuse Global Design Tokens */
    :root {
      --glass-bg: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.18);
      --accent: #fb923c; /* Lava Orange */
      --dark: #060a10;
      --text: #e2eaf5;
      --muted: rgba(226,234,245,0.5);
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 4rem; /* Extra space for footer/controls */
    }

    /* Atmospheric Nether Background */
    .bg {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at 50% -20%, rgba(239, 68, 68, 0.15), transparent);
    }

    .container { max-width: 900px; width: 100%; }

    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0; }
    p.subtitle { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--muted); margin-bottom: 2rem; }

    /* Stats Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      padding: 1.5rem;
      border-radius: 16px;
      text-align: center;
    }

    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: #fff; line-height: 1; }
    .stat-label { font-family: 'Space Mono', monospace; font-size: 0.7rem; text-transform: uppercase; color: var(--accent); margin-top: 0.5rem; }

    /* Dashboard Controls */
    .dashboard-controls {
      display: flex;
      justify-content: flex-end; /* Align to the right */
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap; /* Allow wrapping on small screens */
      width: 100%;
      max-width: 900px;
    }

    .btn-action {
      background: var(--accent);
      color: var(--dark);
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .btn-action:hover {
      background: #ffb76d; /* Slightly brighter orange */
      transform: translateY(-1px);
    }

    .auto-refresh-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .auto-refresh-label input[type="checkbox"] {
      appearance: none; /* Hide default checkbox */
      width: 16px; height: 16px;
      border: 1px solid var(--glass-border);
      border-radius: 4px;
      background-color: var(--glass-bg);
      cursor: pointer;
      position: relative;
      transition: background-color 0.2s, border-color 0.2s;
    }
    .auto-refresh-label input[type="checkbox"]:checked { background-color: var(--accent); border-color: var(--accent); }
    .auto-refresh-label input[type="checkbox"]:checked::before {
      content: '✔'; /* Checkmark */
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 10px; color: var(--dark);
    }

    /* Details Table */
    .details {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; margin-top: 0; color: #fff; }

    table { width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; font-size: 0.9rem; }
    th { text-align: left; color: var(--accent); padding-bottom: 1rem; border-bottom: 1px solid var(--glass-border); }
    td { padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

    .back-btn {
      display: inline-block; margin-top: 2rem; color: var(--muted); text-decoration: none; font-size: 0.8rem; transition: color 0.2s;
    }
    .back-btn:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="container">
    <h1>Command Center</h1>
    <p class="subtitle">Real-time traffic monitor for The Highway Men</p>

    <div class="dashboard-controls">
      <button id="refresh-btn" class="btn-action">Refresh Data</button>
      <label class="auto-refresh-label">
        <input type="checkbox" id="auto-refresh-toggle" checked> Auto-refresh (5s)
      </label>
    </div>

    <div class="grid">
      <div class="card">
        <div class="stat-val" id="total-visits">-</div>
        <div class="stat-label">Total Visits</div>
      </div>
      <div class="card">
        <div class="stat-val" id="unique-visitors">-</div>
        <div class="stat-label">Unique Visitors</div>
      </div>
      <div class="card">
        <div class="stat-val" id="uptime">-</div>
        <div class="stat-label">Server Uptime</div>
      </div>
    </div>

    <div class="details">
      <h2>Top Visitors (IP Log)</h2>
      <table>
        <thead>
          <tr>
            <th>IP Address</th>
            <th>Hits</th>
          </tr>
        </thead>
        <tbody id="ip-list">
          <!-- Dynamic content injected here -->
        </tbody>
      </table>
    </div>

    <div class="details">
      <h2>Top Highway Paths</h2>
      <table>
        <thead>
          <tr>
            <th>Requested Path</th>
            <th>Hits</th>
          </tr>
        </thead>
        <tbody id="path-list">
          <!-- Dynamic content injected here -->
        </tbody>
      </table>
    </div>

    <a href="/" class="back-btn">← Back to HQ</a>
  </div>

  <script>
    let autoRefreshInterval; // Variable to hold the interval ID
    async function fetchStats() {
      try {
        const res = await fetch('/api/stats');
        const data = await res.json();

        document.getElementById('total-visits').innerText = data.totalVisits;
        document.getElementById('unique-visitors').innerText = data.uniqueVisitors;
        document.getElementById('uptime').innerText = data.uptime + 's';

        const ipList = document.getElementById('ip-list');
        ipList.innerHTML = Object.entries(data.topIPs)
          .sort((a, b) => b[1] - a[1])
          .map(([ip, hits]) => `<tr><td>${ip}</td><td>${hits}</td></tr>`)
          .join('');

        const list = document.getElementById('path-list');
        list.innerHTML = Object.entries(data.topPaths)
          .sort((a, b) => b[1] - a[1])
          .map(([path, hits]) => `<tr><td>${path}</td><td>${hits}</td></tr>`)
          .join('');
      } catch (e) {
        console.error("Dashboard Sync Error:", e);
      }
    }

    // Function to start auto-refresh
    function startAutoRefresh() {
      if (!autoRefreshInterval) { // Prevent multiple intervals
        autoRefreshInterval = setInterval(fetchStats, 5000);
      }
    }

    // Function to stop auto-refresh
    function stopAutoRefresh() {
      clearInterval(autoRefreshInterval);
      autoRefreshInterval = null;
    }

    // Event listeners for controls
    document.getElementById('refresh-btn').addEventListener('click', fetchStats);
    document.getElementById('auto-refresh-toggle').addEventListener('change', (event) => {
      if (event.target.checked) {
        startAutoRefresh();
      } else {
        stopAutoRefresh();
      }
    });

    // Initial fetch and start auto-refresh
    fetchStats();
    startAutoRefresh();
  </script>
</body>
</html>
